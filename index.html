<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach de Vie · Conseil des Agents</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap');

  :root {
    --bg: #0c0c10;
    --surface: #13131a;
    --border: #1e1e2a;
    --text: #e8e6e0;
    --muted: #6b6880;
    --accent: #c9a96e;
    --accent2: #7c6fa0;

    --finance: #4a9e7a;
    --finance-dim: #1a3329;
    --affect: #c06070;
    --affect-dim: #3a1a20;
    --pro: #5a8fc0;
    --pro-dim: #1a2535;
    --decision: #c9a96e;
    --decision-dim: #35280f;
    --moderator: #9a8ab0;
    --moderator-dim: #1e1a2a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 18px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .logo { display: flex; flex-direction: column; gap: 0.1rem; }
  .logo-title {
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .agents-bar {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .agent-pill {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    padding: 0.3rem 0.75rem;
    border-radius: 2rem;
    border: 1px solid;
    text-transform: uppercase;
    opacity: 0.7;
    transition: opacity 0.3s;
  }
  .agent-pill.active { opacity: 1; }
  .pill-finance  { color: var(--finance);  border-color: var(--finance);  background: var(--finance-dim);  }
  .pill-affect   { color: var(--affect);   border-color: var(--affect);   background: var(--affect-dim);   }
  .pill-pro      { color: var(--pro);      border-color: var(--pro);      background: var(--pro-dim);      }
  .pill-decision { color: var(--decision); border-color: var(--decision); background: var(--decision-dim); }
  .pill-moderator{ color: var(--moderator);border-color: var(--moderator);background: var(--moderator-dim);}

  /* ── Main layout ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    padding: 0 1.5rem 2rem;
  }

  /* ── Chat thread ── */
  #thread {
    flex: 1;
    padding: 2rem 0 1rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-items: flex-end;
  }

  .msg-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .message.user .msg-header {
    flex-direction: row-reverse;
    color: var(--muted);
  }

  .agent-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-finance  { background: var(--finance); }
  .dot-affect   { background: var(--affect); }
  .dot-pro      { background: var(--pro); }
  .dot-decision { background: var(--decision); }
  .dot-moderator{ background: var(--moderator); }
  .dot-user     { background: var(--text); }

  .msg-bubble {
    max-width: 78%;
    padding: 1rem 1.25rem;
    border-radius: 2px;
    line-height: 1.65;
    font-size: 1rem;
    font-weight: 300;
  }
  .message.user .msg-bubble {
    background: #1c1c28;
    border: 1px solid #2a2a3a;
    color: var(--text);
    border-radius: 2px;
  }

  .bubble-finance  { background: var(--finance-dim);  border-left: 3px solid var(--finance);  }
  .bubble-affect   { background: var(--affect-dim);   border-left: 3px solid var(--affect);   }
  .bubble-pro      { background: var(--pro-dim);      border-left: 3px solid var(--pro);      }
  .bubble-decision { background: var(--decision-dim); border-left: 3px solid var(--decision); }
  .bubble-moderator{ background: var(--moderator-dim);border-left: 3px solid var(--moderator);}

  .msg-bubble em {
    font-style: italic;
    opacity: 0.75;
  }
  .msg-bubble strong {
    font-weight: 600;
    color: var(--accent);
  }

  /* typing indicator */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.8rem 1.25rem;
    max-width: 120px;
  }
  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: blink 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── Input area ── */
  .input-area {
    border-top: 1px solid var(--border);
    padding-top: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .input-row {
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
  }
  #user-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 300;
    padding: 0.85rem 1rem;
    resize: none;
    min-height: 52px;
    max-height: 160px;
    line-height: 1.5;
    transition: border-color 0.2s;
    outline: none;
  }
  #user-input:focus { border-color: var(--accent2); }
  #user-input::placeholder { color: var(--muted); font-style: italic; }

  #send-btn {
    background: var(--accent);
    border: none;
    color: #0c0c10;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.85rem 1.25rem;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, opacity 0.2s;
    flex-shrink: 0;
    white-space: nowrap;
  }
  #send-btn:hover { background: #dbbf88; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-align: right;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* loading overlay */
  #loading-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 0.5s;
  }
  .loading-text {
    font-size: 1.1rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.1em;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
</style>
</head>
<body>

<div id="loading-overlay">
  <span class="loading-text">Initialisation du conseil…</span>
</div>

<header>
  <div class="logo">
    <div class="logo-title">Conseil des Agents</div>
    <div class="logo-sub">Coach de vie · Multi-agents IA</div>
  </div>
  <div class="agents-bar">
    <span class="agent-pill pill-moderator" id="pill-moderator">⬡ Modérateur</span>
    <span class="agent-pill pill-decision" id="pill-decision">◆ Décision</span>
    <span class="agent-pill pill-finance" id="pill-finance">▲ Finance</span>
    <span class="agent-pill pill-affect" id="pill-affect">♥ Affectif</span>
    <span class="agent-pill pill-pro" id="pill-pro">✦ Professionnel</span>
  </div>
</header>

<main>
  <div id="thread"></div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="user-input" placeholder="Répondez ici… ou posez une question au conseil." rows="1"></textarea>
      <button id="send-btn" disabled>Envoyer →</button>
    </div>
    <div class="hint">Entrée pour envoyer · Shift+Entrée pour saut de ligne</div>
  </div>
</main>

<script>
// ── Agent definitions ──
const AGENTS = {
  moderator: {
    name: "Modérateur",
    color: "var(--moderator)",
    dotClass: "dot-moderator",
    bubbleClass: "bubble-moderator",
    pillId: "pill-moderator",
    persona: `Tu es le Modérateur du Conseil de Vie, un coach sage et bienveillant. Ton rôle : orchestrer le dialogue entre les 4 agents spécialisés (Finance, Affectif, Professionnel, Décision), synthétiser leurs apports, et guider l'utilisateur vers la clarté. Tu parles en français, avec une voix douce, incisive et équilibrée. Tu es curieux, tu cherches à comprendre la personne en profondeur. Tu coordonnes qui parle quand.`
  },
  finance: {
    name: "Agent Financier",
    color: "var(--finance)",
    dotClass: "dot-finance",
    bubbleClass: "bubble-finance",
    pillId: "pill-finance",
    persona: `Tu es l'Agent Financier du Conseil de Vie. Tu analyses la sécurité financière, les risques économiques, le patrimoine, les revenus, la retraite, et l'indépendance financière. Tu parles avec pragmatisme et précision, tu challengen les décisions sous l'angle du coût d'opportunité et de la sécurité matérielle. Tu poses des questions précises sur les ressources, les dettes, les économies et les ambitions financières. Tu parles en français, avec une voix directe mais empathique.`
  },
  affect: {
    name: "Agent Affectif",
    color: "var(--affect)",
    dotClass: "dot-affect",
    bubbleClass: "bubble-affect",
    pillId: "pill-affect",
    persona: `Tu es l'Agent Affectif du Conseil de Vie. Tu explores la vie de famille, les relations, l'équilibre vie pro/perso, la solitude, les besoins d'appartenance et d'amour. Tu parles avec chaleur, profondeur émotionnelle, et parfois tu challenges avec douceur les zones d'ombre relationnelles. Tu poses des questions sur les proches, les sacrifices, les besoins affectifs non comblés, les conflits de loyauté. Tu parles en français, avec une voix chaleureuse et introspective.`
  },
  pro: {
    name: "Agent Professionnel",
    color: "var(--pro)",
    dotClass: "dot-pro",
    bubbleClass: "bubble-pro",
    pillId: "pill-pro",
    persona: `Tu es l'Agent Professionnel du Conseil de Vie. Tu explores la carrière, l'apprentissage continu, l'environnement de travail, le sens au travail, la reconnaissance, l'évolution. Tu challenges les décisions sous l'angle de la montée en compétences, du cadre de travail harmonieux, des aspirations professionnelles profondes. Tu poses des questions sur les talents, les frustrations pro, les rêves de carrière. Tu parles en français, avec une voix stimulante et exigeante.`
  },
  decision: {
    name: "Agent Décision",
    color: "var(--decision)",
    dotClass: "dot-decision",
    bubbleClass: "bubble-decision",
    pillId: "pill-decision",
    persona: `Tu es l'Agent Décision du Conseil de Vie. Tu analyses la capacité de l'utilisateur à décider : ses biais cognitifs, sa procrastination, ses blocages, sa confiance en soi, sa tendance à la sur-analyse. Tu poses des questions sur comment il prend ses décisions aujourd'hui, ce qui le bloque, ses regrets. Tu challenges ses raisonnements avec des questions socratiques. Tu parles en français, avec une voix directe, analytique, et parfois un peu provocatrice pour pousser à la réflexion.`
  }
};

// ── State ──
let conversationHistory = [];
let isLoading = false;

// ── DOM helpers ──
const thread = document.getElementById('thread');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

function scrollToBottom() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function setActivePill(agentKey) {
  Object.values(AGENTS).forEach(a => {
    document.getElementById(a.pillId)?.classList.remove('active');
  });
  if (agentKey && AGENTS[agentKey]) {
    document.getElementById(AGENTS[agentKey].pillId)?.classList.add('active');
  }
}

function addMessage(agentKey, text, isUser = false) {
  const msg = document.createElement('div');
  msg.className = 'message' + (isUser ? ' user' : '');

  if (!isUser) {
    const agent = AGENTS[agentKey];
    const header = document.createElement('div');
    header.className = 'msg-header';
    header.innerHTML = `<span class="agent-dot ${agent.dotClass}"></span><span>${agent.name}</span>`;
    msg.appendChild(header);

    const bubble = document.createElement('div');
    bubble.className = `msg-bubble ${agent.bubbleClass}`;
    bubble.innerHTML = formatText(text);
    msg.appendChild(bubble);
  } else {
    const header = document.createElement('div');
    header.className = 'msg-header';
    header.innerHTML = `<span>Vous</span><span class="agent-dot dot-user"></span>`;
    msg.appendChild(header);

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    msg.appendChild(bubble);
  }

  thread.appendChild(msg);
  scrollToBottom();
  return msg;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function showTyping(agentKey) {
  const agent = AGENTS[agentKey];
  const msg = document.createElement('div');
  msg.className = 'message';
  msg.id = 'typing-' + agentKey;

  const header = document.createElement('div');
  header.className = 'msg-header';
  header.innerHTML = `<span class="agent-dot ${agent.dotClass}"></span><span>${agent.name}</span>`;
  msg.appendChild(header);

  const bubble = document.createElement('div');
  bubble.className = `msg-bubble ${agent.bubbleClass} typing-indicator`;
  bubble.innerHTML = `<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>`;
  msg.appendChild(bubble);

  thread.appendChild(msg);
  scrollToBottom();
  return msg;
}

function removeTyping(agentKey) {
  const el = document.getElementById('typing-' + agentKey);
  if (el) el.remove();
}

// ── API call ──
async function callAgent(agentKey, userContext, specificInstruction) {
  const agent = AGENTS[agentKey];
  
  const messages = [
    ...conversationHistory,
    {
      role: "user",
      content: specificInstruction
    }
  ];

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: agent.persona + `\n\nContexte de la conversation jusqu'ici :\n${userContext}\n\nRéponds de manière concise (2-4 phrases max pour les questions, un peu plus pour les synthèses). Sois direct et percutant.`,
      messages
    })
  });

  const data = await response.json();
  return data.content?.[0]?.text || "…";
}

async function callModerator(userMessage) {
  // Moderator decides which agents should respond and in what order
  const historyText = conversationHistory.map(m => `${m.role}: ${m.content}`).join('\n');
  
  const instruction = `L'utilisateur vient de dire : "${userMessage}"

Basé sur ce message et l'historique de conversation, détermine :
1. Quels agents doivent répondre (parmi : finance, affect, pro, decision, moderator)
2. Dans quel ordre
3. Quelle instruction spécifique donner à chaque agent

Réponds UNIQUEMENT en JSON valide, sans texte autour, au format :
{
  "agents": [
    {"key": "moderator", "instruction": "..."},
    {"key": "finance", "instruction": "..."}
  ],
  "synthesis_needed": false
}

Règles :
- Pour le premier message ou les présentations générales : le modérateur accueille, puis 1-2 agents posent une question chacun
- Pour les réponses à des questions spécifiques : les agents concernés réagissent, puis le modérateur synthétise si besoin
- Maximum 3 agents par tour
- Toujours inclure le modérateur en premier si c'est une nouvelle conversation ou une synthèse est nécessaire
- Les instructions doivent être en français et préciser ce que l'agent doit faire/demander spécifiquement`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: "Tu es un orchestrateur de dialogue. Tu réponds UNIQUEMENT en JSON valide, sans aucun texte avant ou après.",
      messages: [{ role: "user", content: instruction }]
    })
  });

  const data = await response.json();
  const raw = data.content?.[0]?.text || '{"agents":[{"key":"moderator","instruction":"Accueille l\'utilisateur et présente le conseil."}]}';
  
  try {
    const clean = raw.replace(/```json\n?|\n?```/g, '').trim();
    return JSON.parse(clean);
  } catch {
    return { agents: [{ key: "moderator", instruction: "Réponds à ce que l'utilisateur vient de dire de manière générale." }] };
  }
}

// ── Main interaction loop ──
async function handleSend() {
  const text = input.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  // Add user message to UI
  addMessage(null, text, true);
  
  // Add to history
  conversationHistory.push({ role: "user", content: text });

  // Get orchestration plan
  const historyText = conversationHistory.map(m => `${m.role}: ${m.content}`).join('\n');
  const plan = await callModerator(text);

  // Execute each agent's response with delay
  const agentResponses = [];
  
  for (let i = 0; i < plan.agents.length; i++) {
    const { key, instruction } = plan.agents[i];
    await new Promise(r => setTimeout(r, i * 800));
    
    setActivePill(key);
    const typingEl = showTyping(key);
    
    await new Promise(r => setTimeout(r, 900 + Math.random() * 600));
    
    const response = await callAgent(key, historyText, instruction);
    removeTyping(key);
    addMessage(key, response);
    agentResponses.push({ agent: AGENTS[key].name, text: response });
  }

  // Update conversation history with agents' responses
  const agentSummary = agentResponses.map(r => `[${r.agent}]: ${r.text}`).join('\n');
  conversationHistory.push({ role: "assistant", content: agentSummary });

  setActivePill(null);
  isLoading = false;
  sendBtn.disabled = false;
  input.focus();
}

// ── Input auto-resize ──
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  sendBtn.disabled = input.value.trim().length === 0;
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

sendBtn.addEventListener('click', handleSend);

// ── Init ──
async function init() {
  // Initial welcome from moderator
  const welcomeInstruction = `Présente-toi brièvement ainsi que le Conseil (les 4 agents : Finance, Affectif, Professionnel, Décision). Explique que tu vas poser des questions pour mieux cerner l'utilisateur. Commence par une première question ouverte et puissante sur ce qui l'amène ici aujourd'hui — quelle décision ou questionnement l'a motivé à consulter ce conseil. Sois chaleureux, bref, et intrigant.`;
  
  const moderatorWelcome = await callAgent("moderator", "", welcomeInstruction);
  addMessage("moderator", moderatorWelcome);
  conversationHistory.push({ role: "assistant", content: `[Modérateur]: ${moderatorWelcome}` });

  // Then one agent asks a first question
  await new Promise(r => setTimeout(r, 1200));
  setActivePill("decision");
  const typingEl = showTyping("decision");
  await new Promise(r => setTimeout(r, 1000));
  
  const decisionQ = await callAgent("decision", moderatorWelcome, "Pose une seule question courte et percutante à l'utilisateur sur sa relation à la prise de décision. Quelque chose qui révèle immédiatement comment il fonctionne. Pas d'introduction, juste la question.");
  removeTyping("decision");
  addMessage("decision", decisionQ);
  conversationHistory.push({ role: "assistant", content: `[Agent Décision]: ${decisionQ}` });
  
  setActivePill(null);

  // Hide loading
  const overlay = document.getElementById('loading-overlay');
  overlay.style.opacity = '0';
  setTimeout(() => overlay.remove(), 500);

  sendBtn.disabled = false;
  input.focus();
}

init();
</script>
</body>
</html>
